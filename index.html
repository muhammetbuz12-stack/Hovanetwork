<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hovanetwork</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #fff;
    background: linear-gradient(-45deg, #0f2027, #2c5364, #5b247a, #1b1b3a, #0f2027);
    background-size: 400% 400%;
    animation: gradientShift 15s ease infinite;
    overflow-x: hidden;
  }

  @keyframes gradientShift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  @keyframes shine {
    to { background-position: 200% center; }
  }

  /* ---- HOŞGELDİN (HERO) ---- */
  #hero {
    width: 100%;
    text-align: center;
    padding: 70px 20px 40px;
    animation: fadeIn 0.6s ease;
  }
  #hero h1 {
    font-size: 46px;
    background: linear-gradient(90deg, #00c6ff, #7b2ff7, #f72585, #00c6ff);
    background-size: 300% auto;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: shine 6s linear infinite;
  }
  #hero p.welcome-sub {
    margin-top: 10px;
    font-size: 16px;
    opacity: 0.8;
  }
  #statusBadge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 20px;
    padding: 8px 18px;
    border-radius: 30px;
    background: rgba(67, 233, 123, 0.12);
    border: 1px solid rgba(67, 233, 123, 0.4);
    font-size: 14px;
    font-weight: bold;
    color: #43e97b;
  }
  #statusBadge .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #43e97b;
    box-shadow: 0 0 8px #43e97b;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ---- MAĞAZA EKRANI ---- */
  #shopScreen { width: 100%; max-width: 1000px; padding: 10px 20px 50px; animation: fadeIn 0.6s ease; }
  #shopScreen h2.shop-title {
    text-align: center;
    font-size: 28px;
    letter-spacing: 1px;
  }
  #shopScreen p.sub { text-align: center; opacity: 0.75; margin-top: 5px; font-size: 15px; }

  #playerNameBox { max-width: 420px; margin: 25px auto; text-align: center; }
  #playerNameBox input {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(0,0,0,0.3);
    color: #fff;
    font-size: 15px;
    text-align: center;
    outline: none;
    transition: border 0.2s;
  }
  #playerNameBox input:focus { border: 1px solid #f72585; }

  .ranks {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 20px;
    margin-top: 30px;
  }

  .rank-card {
    position: relative;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 14px;
    padding: 24px;
    text-align: center;
    overflow: hidden;
    transition: transform 0.25s, box-shadow 0.25s;
  }
  .rank-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  }
  .rank-card::before {
    content: "";
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: var(--grad);
    opacity: 0.18;
    animation: spin 8s linear infinite;
    z-index: 0;
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  .rank-card > * { position: relative; z-index: 1; }

  .rank-card h2 {
    margin-bottom: 10px;
    font-size: 22px;
    background: var(--grad);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .rank-card .price {
    font-size: 28px;
    font-weight: bold;
    margin: 10px 0 16px;
    color: #fff;
  }
  .rank-card button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: var(--grad);
    color: #fff;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: filter 0.2s;
  }
  .rank-card button:hover { filter: brightness(1.15); }

  #resultBox {
    margin-top: 25px;
    text-align: center;
    font-size: 15px;
    min-height: 20px;
    font-weight: bold;
  }
</style>
</head>
<body>

  <!-- HOŞGELDİN -->
  <div id="hero">
    <h1>Hovanetwork'e Hoşgeldin</h1>
    <p class="welcome-sub">Rank satın alarak sunucuya destek ol, ayrıcalıklardan yararlan!</p>
    <div id="statusBadge"><span class="dot"></span> Sunucu Aktif</div>
  </div>

  <!-- MAĞAZA EKRANI -->
  <div id="shopScreen">
    <h2 class="shop-title">Rank Mağazası</h2>
    <p class="sub">Aşağıdan istediğin ranki seç</p>

    <div id="playerNameBox">
      <input type="text" id="playerName" placeholder="Minecraft kullanıcı adınızı girin">
    </div>

    <div class="ranks">
      <div class="rank-card" style="--grad: linear-gradient(135deg, #00c6ff, #0072ff);">
        <h2>VIP</h2>
        <div class="price">100 TL</div>
        <button onclick="buyRank('vip')">Satın Al</button>
      </div>
      <div class="rank-card" style="--grad: linear-gradient(135deg, #43e97b, #38f9d7);">
        <h2>VIP+</h2>
        <div class="price">150 TL</div>
        <button onclick="buyRank('vipplus')">Satın Al</button>
      </div>
      <div class="rank-card" style="--grad: linear-gradient(135deg, #f7971e, #ffd200);">
        <h2>HVIP</h2>
        <div class="price">200 TL</div>
        <button onclick="buyRank('hvip')">Satın Al</button>
      </div>
      <div class="rank-card" style="--grad: linear-gradient(135deg, #ff6a00, #ee0979);">
        <h2>HVIP+</h2>
        <div class="price">250 TL</div>
        <button onclick="buyRank('hvipplus')">Satın Al</button>
      </div>
      <div class="rank-card" style="--grad: linear-gradient(135deg, #7b2ff7, #f107a3);">
        <h2>HOVAVIP</h2>
        <div class="price">300 TL</div>
        <button onclick="buyRank('hovavip')">Satın Al</button>
      </div>
      <div class="rank-card" style="--grad: linear-gradient(135deg, #f72585, #7209b7);">
        <h2>HOVAVIP+</h2>
        <div class="price">350 TL</div>
        <button onclick="buyRank('hovavipplus')">Satın Al</button>
      </div>
    </div>

    <div id="resultBox"></div>
  </div>

<script>
  async function buyRank(rankId) {
    const playerName = document.getElementById('playerName').value.trim();
    const resultBox = document.getElementById('resultBox');

    if (!playerName) {
      resultBox.style.color = '#ff6b6b';
      resultBox.innerText = 'Lütfen önce kullanıcı adınızı girin!';
      return;
    }

    resultBox.style.color = '#fff';
    resultBox.innerText = 'İşlem yapılıyor...';

    try {
      const res = await fetch('/api/buy', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ playerName, rankId })
      });
      const data = await res.json();

      if (data.success) {
        resultBox.style.color = '#43e97b';
        resultBox.innerText = data.message;
      } else {
        resultBox.style.color = '#ff6b6b';
        resultBox.innerText = data.message;
      }
    } catch (err) {
      resultBox.style.color = '#ff6b6b';
      resultBox.innerText = 'Sunucuya bağlanılamadı: ' + err.message;
    }
  }
</script>

</body>
</html>
